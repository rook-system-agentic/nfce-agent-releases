name: Build Installer (Windows)

# Compila o instalador gráfico do Agente de Captação (Inno Setup) num runner
# Windows e sobe o RookAgentSetup.exe como artefato.
#
# CODE SIGNING (certificado OV SSL.com da Rook System, jul/2026): em
# workflow_dispatch o instalador é ASSINADO via eSigner/CodeSignTool e, se
# attach_to_release=true, anexado ao release. Antes de compilar, um gate
# exige que o rook-agent-win.exe baixado JÁ esteja assinado — instalador
# assinado não pode embalar agente sem assinatura (o auto-update entrega o
# binário cru). Builds de PR/push só provam que compila: não assinam e não
# tocam nos secrets ES_*.
on:
  push:
    branches: ['**']
    paths:
      - 'installer/**'
      - '.github/workflows/build-installer.yml'
  pull_request:
    paths:
      - 'installer/**'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release que contém o rook-agent-win.exe'
        required: true
        default: 'nfce-agent-v1.2.3'
      attach_to_release:
        description: 'Anexar o RookAgentSetup.exe assinado ao release'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # write só é exercido no passo de anexar (dispatch); PRs não chegam lá
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar o rook-agent-win.exe do release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "nfce-agent-v1.2.3" }
          gh release download $tag -R "${{ github.repository }}" -p "rook-agent-win.exe" -D installer
          Copy-Item "installer/rook-agent-win.exe" "installer/rook-agent.exe" -Force

      # Gate ROO-648: a versão do binário baixado TEM que bater com o
      # AppVersion do .iss. Sem isto, um dispatch com tag errada embala um
      # agente antigo sem --configure — e o instalador congela para sempre
      # no Exec do ssPostInstall (o smoke do build-nfce-agent não viaja
      # até o release; este é o único ponto que vê exe e .iss juntos).
      - name: Conferir versão do binário vs AppVersion do .iss
        shell: pwsh
        run: |
          $appVersion = (Select-String -Path installer/rook-agent-setup.iss -Pattern '#define AppVersion "([^"]+)"').Matches[0].Groups[1].Value
          $binVersion = (& installer/rook-agent.exe --version) | Out-String
          Write-Host "AppVersion do .iss: $appVersion"
          Write-Host "Binário respondeu: $($binVersion.Trim())"
          if ($binVersion -notmatch [regex]::Escape($appVersion)) {
            throw "Binário baixado NÃO é v$appVersion — tag errada ou release desatualizado. Abortando para não embalar instalador $appVersion com agente antigo."
          }

      # Gate de assinatura: no fluxo de release, o agente embalado precisa
      # estar assinado (senão o SmartScreen volta a gritar no auto-update).
      # Publique primeiro pelo build-nfce-agent do monorepo (que assina).
      - name: Gate — agente embalado precisa estar assinado (dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature installer/rook-agent.exe
          Write-Host "Agente: $($sig.Status) — $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid' -or $sig.SignerCertificate.Subject -notmatch 'Rook System') {
            throw "rook-agent-win.exe do release NÃO está assinado pela Rook System. Rode antes o publish do build-nfce-agent (monorepo), que assina e sobe o binário."
          }

      - name: Instalar o Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compilar o instalador
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\rook-agent-setup.iss"

      # ACEITE ROO-509 — o instalador TEM que deixar o agente em execução.
      # Era o sintoma do João: instala, tela de sucesso e nada no Gerenciador de
      # Tarefas. O [Run] estava gated em `Check: ShouldRunAgentNow` → ConfigOk,
      # mas o Inno processa as entradas [Run] ANTES de CurStepChanged(ssPostInstall),
      # onde ConfigOk vira True — o Check era sempre False e o agente só subia no
      # próximo logon (pelo VBS). Este passo instala de verdade num Windows real e
      # falha se nenhum processo estiver de pé ao fim da instalação.
      #
      # Config é pré-criada para cair no caminho "manter configuração" (KeepConfig),
      # que dispensa token real; o agente com token inválido apenas loga o 401 e
      # segue vivo (src/index.ts:583-589), então o teste é estável.
      - name: Aceite ROO-509 — instalador deixa o agente rodando (Windows real)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appDir = Join-Path $env:LOCALAPPDATA 'Rook Agent'
          $xmlDir = Join-Path $env:TEMP 'xmls-ci-roo509'
          New-Item -ItemType Directory -Force -Path $appDir, $xmlDir | Out-Null

          # Config prévia → PrevConfigExists=True → KeepConfig=True em modo silencioso
          $cfg = @{ token = 'rk_agent_ci_roo509'; folder = $xmlDir } | ConvertTo-Json -Compress
          [System.IO.File]::WriteAllText((Join-Path $appDir '.rook-agent.json'), $cfg, (New-Object System.Text.UTF8Encoding($false)))

          # Terreno limpo: nenhum agente de execução anterior
          Get-Process rook-agent -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -Seconds 1
          if (Get-Process rook-agent -ErrorAction SilentlyContinue) { throw 'Ambiente sujo: rook-agent ainda em execução antes do teste' }

          Write-Host 'Instalando em modo silencioso...'
          $p = Start-Process -FilePath 'installer\Output\RookAgentSetup.exe' `
                 -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
          Write-Host "Instalador saiu com código $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "Instalador falhou (exit $($p.ExitCode))" }

          # O agente sobe escondido e em background: dá tempo de arrancar
          $agent = $null
          foreach ($i in 1..15) {
            Start-Sleep -Seconds 2
            $agent = Get-Process rook-agent -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($agent) { break }
          }

          if (-not $agent) {
            Write-Host '--- log do agente (se houver) ---'
            $log = Join-Path $appDir 'rook-agent.log'
            if (Test-Path $log) { Get-Content $log -Tail 30 } else { Write-Host '(sem log)' }
            throw 'REGRESSAO ROO-509: a instalacao terminou e NENHUM rook-agent.exe esta em execucao. O usuario ve "concluido" e nada no Gerenciador de Tarefas.'
          }

          Write-Host "OK: rook-agent.exe em execucao (PID $($agent.Id)) logo apos a instalacao."

          # Autostart também tem que existir (garante o agente no próximo logon)
          $vbs = Join-Path ([Environment]::GetFolderPath('Startup')) 'Rook Agent.vbs'
          if (-not (Test-Path $vbs)) { throw 'Autostart (Rook Agent.vbs) nao foi criado na pasta Startup' }
          Write-Host 'OK: autostart registrado no Startup.'

          Stop-Process -Id $agent.Id -Force -ErrorAction SilentlyContinue

      # Assinatura do instalador via eSigner (nuvem). CodeSignTool fixado em
      # v1.3.2 com SHA-256 conferido; jar invocado direto (o .bat exige o JDK
      # do zip de 214 MB e o .sh não põe aspas nos argumentos).
      - name: Assinar RookAgentSetup.exe (eSigner CodeSignTool)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:ES_USERNAME -or -not $env:ES_PASSWORD -or -not $env:ES_TOTP_SECRET) {
            throw "Secrets ES_USERNAME/ES_PASSWORD/ES_TOTP_SECRET ausentes (org secrets)."
          }
          curl.exe -fsSL -o codesigntool.zip https://github.com/SSLcom/CodeSignTool/releases/download/v1.3.2/CodeSignTool-v1.3.2.zip
          $hash = (Get-FileHash codesigntool.zip -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne 'f14b1e1ef14bfa1fd00279c363aab0debbf5dcfba0e4bcdce5d22bb771de0e3a') {
            throw "SHA-256 do CodeSignTool não confere: $hash"
          }
          Expand-Archive codesigntool.zip -DestinationPath cst -Force
          $env:JAVA_HOME = $env:JAVA_HOME_17_X64
          $env:Path = "$env:JAVA_HOME\bin;$env:Path"
          New-Item -ItemType Directory -Force -Path signed | Out-Null
          Set-Location cst
          & java -jar jar\code_sign_tool-1.3.2.jar sign `
            "-username=$env:ES_USERNAME" `
            "-password=$env:ES_PASSWORD" `
            "-totp_secret=$env:ES_TOTP_SECRET" `
            "-input_file_path=$env:GITHUB_WORKSPACE\installer\Output\RookAgentSetup.exe" `
            "-output_dir_path=$env:GITHUB_WORKSPACE\signed"
          if ($LASTEXITCODE -ne 0) { throw "CodeSignTool falhou ($LASTEXITCODE)" }
          Set-Location $env:GITHUB_WORKSPACE
          if (-not (Test-Path signed/RookAgentSetup.exe)) { throw "arquivo assinado não foi gerado" }
          Move-Item -Force signed/RookAgentSetup.exe installer/Output/RookAgentSetup.exe

      - name: Verificar Authenticode do instalador
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature installer/Output/RookAgentSetup.exe
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          Write-Host "Timestamp: $($sig.TimeStamperCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            throw "Assinatura INVÁLIDA: $($sig.Status) — $($sig.StatusMessage)"
          }
          if ($sig.SignerCertificate.Subject -notmatch 'Rook System') {
            throw "Assinante inesperado: $($sig.SignerCertificate.Subject)"
          }
          Write-Host 'ASSINATURA DO INSTALADOR OK.'

      - name: Anexar ao release
        if: github.event_name == 'workflow_dispatch' && inputs.attach_to_release == true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          gh release upload $tag installer/Output/RookAgentSetup.exe -R "${{ github.repository }}" --clobber
          Write-Host "RookAgentSetup.exe assinado anexado ao release $tag."

      - name: Publicar o artefato
        uses: actions/upload-artifact@v4
        with:
          name: RookAgentSetup
          path: installer/Output/RookAgentSetup.exe
          if-no-files-found: error
